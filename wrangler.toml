name = "smart-wealth-tracker"
pages_build_output_dir = "public"
compatibility_date = "2026-05-29"

# ─── Cron Triggers ──────────────────────────────────────────────────────────────
# NOTE: Cron triggers for Pages Functions must be set via Cloudflare Dashboard:
# Pages → Project → Settings → Functions → Cron Triggers
# Daily Backup:  0 17 * * *   (00:00 ICT = 17:00 UTC)
# Daily Report:  0 13 * * *   (20:00 ICT = 13:00 UTC)

# ─── D1 Database (Primary Storage) ─────────────────────────────────────────────
# Run: npx wrangler d1 create smart-wealth-db
# Then replace database_id below with the ID shown in output
[[d1_databases]]
binding     = "DB"
database_name = "smart-wealth-db-v2"
database_id   = "54e5716b-3b50-4c3c-9f31-e9e921d6c6ce"

# ─── KV (Legacy Session + File Fallback) ───────────────────────────────────────
# Existing KV — kept for backward compatibility (file storage fallback)
[[kv_namespaces]]
binding = "KV_STORE"
id      = "e062e198ab3446aab017d44b8dc87e92"

# ─── R2 (Image Storage) ─────────────────────────────────────────────────────────
# Run: npx wrangler r2 bucket create smart-wealth-tracker-images
[[r2_buckets]]
binding     = "IMAGES"
bucket_name = "smart-wealth-tracker-images-v2"

# ─── Environment Variables (Secrets — set via Dashboard or wrangler secret) ────
# Set these via: npx wrangler secret put LINE_CHANNEL_ACCESS_TOKEN
# npx wrangler secret put LINE_USER_ID
# npx wrangler secret put GDRIVE_SA_KEY
# npx wrangler secret put GDRIVE_FOLDER_ID
#
# [vars]
# These are NON-SECRET vars (safe to commit). Secrets must use `wrangler secret`.


